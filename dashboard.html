<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM FRETE - Painel de Controle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bf-blue: #003D7C; --bf-blue-light: #0056b3; --bf-orange: #FF6D00; --bf-orange-hover: #ff8533;
            --bg-dark: #0d0d0d; --surface-dark: #1a1a1a; --surface-lighter: #262626; 
            --text-main: #ffffff; --text-muted: #a0a0a0; --border-color: #333;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* TOPBAR */
        .topbar { height: 70px; background: rgba(26, 26, 26, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 200; }
        .topbar-left { display: flex; align-items: center; width: 30%; }
        .topbar-center { display: flex; justify-content: center; align-items: center; flex: 1; }
        .topbar-right { display: flex; justify-content: flex-end; align-items: center; width: 30%; gap: 15px; }

        .brand { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); }
        .brand span { color: var(--bf-orange); }

        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-muted); cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; padding: 8px; border-radius: 8px; }
        .btn-hamburger { display: none; }

        /* SIDEBAR */
        .app-wrapper { display: flex; flex: 1; overflow: hidden; position: relative; }
        .sidebar { width: 260px; background-color: var(--surface-dark); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 0; gap: 5px; z-index: 150; }
        .nav-btn { background: transparent; color: var(--text-muted); border: none; padding: 15px 30px; text-align: left; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; width: 100%; }
        .nav-btn:hover { background-color: var(--surface-lighter); color: var(--text-main); border-left-color: var(--bf-blue-light); }
        .nav-btn.active-nav { background: linear-gradient(90deg, rgba(0,61,124,0.3) 0%, transparent 100%); color: var(--bf-orange); border-left-color: var(--bf-orange); }

        /* BOTÃO SAIR SIDEBAR (Fixado no fundo) */
        .sidebar-footer { margin-top: auto; padding: 20px; border-top: 1px solid var(--border-color); }
        .btn-logout-sidebar { width: 100%; padding: 12px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-logout-sidebar:hover { background: #ef4444; color: white; }

        /* CONTENT */
        .content-area { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #111 0%, var(--bg-dark) 100%); }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .hidden { display: none !important; }
        .card { background-color: var(--surface-dark); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; margin-bottom: 20px; }

        /* MOBILE */
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 140; backdrop-filter: blur(2px); }
        
        @media (max-width: 768px) {
            .btn-hamburger { display: flex !important; }
            .topbar-right .desktop-logout { display: none !important; } /* Esconde o botão sair do topo no telemóvel */
            .sidebar { position: fixed; left: -260px; top: 0; height: 100vh; transition: 0.3s; padding-top: 70px; }
            .sidebar.active { transform: translateX(260px); }
            .mobile-overlay.active { display: block; }
            .content-area { padding: 20px; }
            .topbar { padding: 0 15px; }
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">
            <button class="icon-btn btn-hamburger" onclick="app.toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
        <div class="topbar-center">
            <div class="brand">BOM<span>FRETE</span></div>
        </div>
        <div class="topbar-right">
            <button class="icon-btn desktop-logout" onclick="app.logout()" style="border-color: #ef4444; color: #ef4444; gap: 5px; padding: 5px 12px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span style="font-size: 11px; font-weight: bold;">SAIR</span>
            </button>
            <div class="profile-trigger" onclick="app.navigate('perfil')">
                <div class="avatar"><img id="avatar-header" src="img/default.png" onerror="this.style.display='none'"></div>
            </div>
        </div>
    </header>

    <div class="app-wrapper">
        <div id="mobile-overlay" class="mobile-overlay" onclick="app.closeSidebar()"></div>

        <aside class="sidebar" id="app-sidebar">
            <div style="padding: 10px 25px; color: var(--text-muted); font-size: 12px; letter-spacing: 1px;">NAVEGAÇÃO</div>
            <button class="nav-btn" data-target="perfil" onclick="app.navigate('perfil')">⚙️ Meu Perfil</button>
            <button class="nav-btn embarcador-only hidden" data-target="minhas-cargas" onclick="app.navigate('minhas-cargas')">📦 Gestão de Cargas</button>
            <button class="nav-btn embarcador-only hidden" data-target="postar-carga" onclick="app.navigate('postar-carga')" style="color:var(--bf-orange)">+ Nova Carga</button>
            <button class="nav-btn motorista-only hidden" data-target="gestao-cargas" onclick="app.navigate('gestao-cargas')">🔍 Procurar Fretes</button>
            <button class="nav-btn motorista-only hidden" data-target="minhas-viagens" onclick="app.navigate('minhas-viagens')">🛣️ Minhas Viagens</button>
            <button class="nav-btn motorista-only hidden" data-target="historico-viagens" onclick="app.navigate('historico-viagens')">✅ Histórico</button>

            <div class="sidebar-footer">
                <button class="btn-logout-sidebar" onclick="app.logout()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    SAIR DO SISTEMA
                </button>
            </div>
        </aside>

        <main class="content-area">
            <section id="view-perfil" class="view-section">
                <h2 class="section-title">Meu Perfil</h2>
                <div class="card" id="perfil-card">Carregando dados...</div>
                <form id="form-perfil" class="hidden">
                    <input type="text" id="perfil-nome">
                    <input type="text" id="perfil-email">
                    <input type="text" id="perfil-telefone">
                </form>
            </section>

            <section id="view-minhas-cargas" class="view-section active">
                <h2 class="section-title">📦 Gestão de Cargas</h2>
                <div id="lista-minhas-cargas"></div>
            </section>

            <section id="view-postar-carga" class="view-section">
                <h2 class="section-title">Publicar Nova Carga</h2>
                <div class="card">
                    <form id="form-nova-carga" onsubmit="app.postarCarga(event)">
                        <input type="text" id="carga-origem" class="hidden"><input type="text" id="carga-destino" class="hidden">
                        <input type="number" id="carga-valor" class="hidden"><textarea id="carga-descricao" class="hidden"></textarea>
                        <p>Formulário de carga ativo.</p>
                    </form>
                </div>
            </section>

            <section id="view-gestao-cargas" class="view-section"><div id="lista-cargas-disponiveis"></div></section>
            <section id="view-minhas-viagens" class="view-section"><div id="lista-minhas-viagens"></div></section>
            <section id="view-historico-viagens" class="view-section"><div id="lista-historico-viagens"></div></section>
        </main>
    </div>

    <div class="chat-fab" onclick="app.abrirListaChats()"><span id="chat-badge" class="hidden">!</span></div>
    <div id="modal-rastreio" class="hidden"><div id="rastreio-info"></div></div>
    <div id="modal-chat" class="hidden"><div id="chat-box"></div><input type="text" id="chat-input"></div>
    <div id="toast-container"></div>

    <script src="js/dashboard.js"></script>
</body>
</html>
