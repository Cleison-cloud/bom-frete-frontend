<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM FRETE - Painel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bf-blue: #003D7C; --bf-orange: #FF6D00; --bg-dark: #0d0d0d;
            --surface-dark: #1a1a1a; --text-main: #ffffff; --text-muted: #a0a0a0;
            --border-color: #333; --wa-green: #054d44; --wa-dark: #202c33;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER */
        .topbar { height: 70px; background: rgba(26, 26, 26, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 200; }
        .topbar-right { display: flex; align-items: center; gap: 15px; }
        .brand { font-size: 22px; font-weight: 800; color: var(--text-main); }
        .brand span { color: var(--bf-orange); }

        /* SIDEBAR */
        .app-wrapper { display: flex; flex: 1; overflow: hidden; position: relative; }
        .sidebar { width: 260px; background-color: var(--surface-dark); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 0; z-index: 150; }
        .nav-btn { background: transparent; color: var(--text-muted); border: none; padding: 15px 30px; text-align: left; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s; }
        .nav-btn:hover, .active-nav { color: var(--bf-orange); background: rgba(255,109,0,0.1); border-left: 4px solid var(--bf-orange); }

        /* CONTENT */
        .content-area { flex: 1; padding: 40px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .card { background-color: var(--surface-dark); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-dark); color: white; margin-bottom: 10px; box-sizing: border-box; }
        .hidden { display: none !important; }

        /* WHATSAPP CHAT */
        .chat-box { height: 350px; overflow-y: auto; background: #0b141a; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 14px; position: relative; display: flex; flex-direction: column; }
        .msg-minha { align-self: flex-end; background: var(--wa-green); }
        .msg-outra { align-self: flex-start; background: var(--wa-dark); }
        .msg-time { font-size: 9px; opacity: 0.6; align-self: flex-end; margin-top: 4px; }
        
        /* UTILS */
        .chat-fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; }
        #chat-badge { position: absolute; top: 0; right: 0; background: red; color: white; border-radius: 50%; padding: 4px 8px; font-size: 10px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; height: 100vh; transition: 0.3s; }
            .sidebar.active { transform: translateX(260px); }
            .header-logout-btn { display: none; }
        }
    </style>
</head>
<body>

    <header class="topbar">
        <button class="icon-btn" onclick="app.toggleSidebar()" style="background:none; border:none; color:white; font-size:24px;">☰</button>
        <div class="brand">BOM<span>FRETE</span></div>
        <div class="topbar-right">
            <div style="text-align: right;">
                <div id="user-name" style="font-weight: 700;">...</div>
                <div id="user-role" style="font-size: 11px; color: var(--bf-orange);">...</div>
            </div>
            <div class="avatar" onclick="app.navigate('perfil')">
                <img id="avatar-header" src="" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--bf-orange);">
                <div id="avatar-fallback" style="display:none;">👤</div>
            </div>
            <button class="header-logout-btn" onclick="app.logout()" style="color:red; background:none; border:1px solid red; padding:5px 10px; border-radius:5px; cursor:pointer;">SAIR</button>
        </div>
    </header>

    <div class="app-wrapper">
        <div id="mobile-overlay" class="mobile-overlay" onclick="app.closeSidebar()"></div>
        
        <aside class="sidebar" id="app-sidebar">
            <button class="nav-btn" data-target="perfil" onclick="app.navigate('perfil')">⚙️ Perfil</button>
            <button class="nav-btn embarcador-only" data-target="minhas-cargas" onclick="app.navigate('minhas-cargas')">📦 Minhas Cargas</button>
            <button class="nav-btn embarcador-only" data-target="postar-carga" onclick="app.navigate('postar-carga')">➕ Nova Carga</button>
            <button class="nav-btn motorista-only" data-target="gestao-cargas" onclick="app.navigate('gestao-cargas')">🔍 Procurar Fretes</button>
            <button class="nav-btn motorista-only" data-target="minhas-viagens" onclick="app.navigate('minhas-viagens')">🛣️ Minhas Viagens</button>
            <button class="nav-btn motorista-only" data-target="historico-viagens" onclick="app.navigate('historico-viagens')">✅ Histórico</button>
            <div style="flex:1;"></div>
            <button class="nav-btn" onclick="app.logout()" style="color:red;">❌ Sair</button>
        </aside>

        <main class="content-area">
            <section id="view-perfil" class="view-section">
                <div class="card">
                    <img id="perfil-foto-preview" src="" style="width:100px; height:100px; border-radius:50%;">
                    <input type="file" id="input-foto" class="hidden" onchange="app.uploadFoto(event)">
                    <form id="form-perfil">
                        <input type="text" id="perfil-nome" class="form-control" readonly>
                        <input type="text" id="perfil-email" class="form-control" readonly>
                        <input type="text" id="perfil-telefone" class="form-control" readonly>
                        <input type="text" id="perfil-placa" class="form-control hidden" readonly>
                        <button type="button" id="btn-edit-perfil" onclick="app.toggleEditPerfil()">Editar</button>
                        <button type="button" id="btn-save-perfil" class="hidden" onclick="app.salvarPerfil(event)">Salvar</button>
                    </form>
                </div>
            </section>

            <section id="view-minhas-cargas" class="view-section active">
                <h2>Minhas Cargas</h2>
                <div id="lista-minhas-cargas"></div>
            </section>

            <section id="view-postar-carga" class="view-section">
                <h2>Nova Carga</h2>
                <form id="form-nova-carga" onsubmit="app.postarCarga(event)" class="card">
                    <input type="text" id="carga-origem" class="form-control" placeholder="Origem">
                    <input type="text" id="carga-destino" class="form-control" placeholder="Destino">
                    <input type="number" id="carga-valor" class="form-control" placeholder="Valor">
                    <textarea id="carga-descricao" class="form-control" placeholder="Descrição"></textarea>
                    <button type="submit" id="btn-postar" class="nav-btn" style="background:var(--bf-orange); color:white; text-align:center;">Transmitir Frete</button>
                </form>
            </section>

            <section id="view-gestao-cargas" class="view-section"><div id="lista-cargas-disponiveis"></div></section>
            <section id="view-minhas-viagens" class="view-section"><div id="lista-minhas-viagens"></div></section>
            <section id="view-historico-viagens" class="view-section"><div id="lista-historico-viagens"></div></section>
        </main>
    </div>

    <div id="modal-chat" class="modal-overlay hidden">
        <div class="card" style="width:400px; max-height:90vh; display:flex; flex-direction:column;">
            <div id="chat-view-list">
                <h3>Conversas</h3>
                <div id="lista-de-contatos-chat"></div>
            </div>
            <div id="chat-view-messages" class="hidden">
                <div style="display:flex; align-items:center; gap:10px;">
                    <button onclick="app.voltarParaListaChats()">←</button>
                    <h3 id="chat-titulo"></h3>
                </div>
                <div class="chat-box" id="chat-box"></div>
                <form onsubmit="app.enviarMensagem(event)" style="display:flex; gap:5px; margin-top:10px;">
                    <input type="text" id="chat-input" class="form-control" placeholder="Mensagem..." style="margin:0;">
                    <button type="submit" style="background:var(--wa-green); border:none; color:white; padding:10px; border-radius:5px;">➤</button>
                </form>
            </div>
            <button onclick="app.fecharChat()" style="margin-top:10px;">Fechar</button>
        </div>
    </div>

    <div id="modal-rastreio" class="modal-overlay hidden">
        <div class="card">
            <h3>📍 Rastreio</h3>
            <div id="rastreio-info"></div>
            <button onclick="app.fecharRastreio()">Fechar</button>
        </div>
    </div>

    <div class="chat-fab" onclick="app.abrirListaChats()">
        <span>💬</span>
        <span id="chat-badge" class="hidden">!</span>
    </div>
    <div id="toast-container"></div>

    <script src="js/dashboard.js"></script>
</body>
</html>
