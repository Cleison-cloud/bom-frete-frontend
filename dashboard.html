<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM FRETE - Painel de Controle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bf-blue: #003D7C; --bf-blue-light: #0056b3; --bf-orange: #FF6D00; --bf-orange-hover: #ff8533;
            --bg-dark: #0d0d0d; --surface-dark: #1a1a1a; --surface-lighter: #262626; 
            --text-main: #ffffff; --text-muted: #a0a0a0; --border-color: #333;
            --wa-green: #054d44; --wa-dark: #202c33; /* Cores WhatsApp */
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* TOPBAR */
        .topbar { height: 70px; background: rgba(26, 26, 26, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 200; }
        .topbar-left, .topbar-right { display: flex; align-items: center; width: 33%; gap: 15px; }
        .topbar-center { display: flex; justify-content: center; align-items: center; width: 33%; }
        .brand { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); }
        .brand span { color: var(--bf-orange); }

        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-muted); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; padding: 8px; border-radius: 8px; }
        .btn-hamburger { display: none; }

        .profile-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background-color: var(--bf-blue); border: 2px solid var(--bf-orange); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* SIDEBAR */
        .app-wrapper { display: flex; flex: 1; overflow: hidden; position: relative; }
        .sidebar { width: 260px; background-color: var(--surface-dark); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 0; z-index: 150; }
        .nav-btn { background: transparent; color: var(--text-muted); border: none; padding: 15px 30px; text-align: left; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; width: 100%; }
        .nav-btn:hover { background-color: var(--surface-lighter); color: var(--text-main); border-left-color: var(--bf-blue-light); }
        .nav-btn.active-nav { background: linear-gradient(90deg, rgba(0,61,124,0.3) 0%, transparent 100%); color: var(--bf-orange); border-left-color: var(--bf-orange); }

        /* CONTEÚDO */
        .content-area { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #111 0%, var(--bg-dark) 100%); }
        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        .hidden { display: none !important; }
        .card { background-color: var(--surface-dark); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-dark); color: var(--text-main); margin-bottom: 15px; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        /* ESTILO WHATSAPP NO CHAT */
        .chat-box { height: 380px; overflow-y: auto; background: #0b141a; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; border: 1px solid #222; }
        .msg-bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 14px; color: white; position: relative; display: flex; flex-direction: column; line-height: 1.4; }
        .msg-minha { align-self: flex-end; background-color: var(--wa-green); border-bottom-right-radius: 2px; }
        .msg-outra { align-self: flex-start; background-color: var(--wa-dark); border-bottom-left-radius: 2px; }
        .msg-time { font-size: 10px; opacity: 0.6; align-self: flex-end; margin-top: 5px; font-weight: normal; }

        .chat-input-area { display: flex; align-items: center; gap: 10px; background: #202c33; padding: 10px 15px; border-radius: 30px; margin-top: 15px; }
        .chat-input-area input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 15px; }
        .chat-btn { background: transparent; border: none; color: #8696a0; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
        .btn-send { color: #00a884; }
        .chat-btn:hover { transform: scale(1.1); color: white; }

        /* MOBILE FIXES */
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 140; backdrop-filter: blur(2px); }
        @media (max-width: 768px) {
            .btn-hamburger { display: flex !important; }
            .header-logout-btn { display: none !important; }
            .sidebar { position: fixed; left: -260px; top: 0; height: 100vh; transition: 0.3s; padding-top: 80px; }
            .sidebar.active { transform: translateX(260px); }
            .mobile-overlay.active { display: block; }
            .content-area { padding: 20px; }
        }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 999; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">
            <button class="icon-btn btn-hamburger" onclick="app.toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
        <div class="topbar-center">
            <div class="brand">BOM<span>FRETE</span></div>
        </div>
        <div class="topbar-right">
            <button class="icon-btn header-logout-btn" onclick="app.logout()" style="border-color: #ef4444; color: #ef4444; gap: 5px; padding: 5px 12px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span style="font-size: 11px; font-weight: bold;">SAIR</span>
            </button>
            <div class="profile-trigger" onclick="app.navigate('perfil')">
                <div style="display: flex; flex-direction: column; text-align: right; margin-right: 10px;" class="hidden-mobile">
                    <span id="user-name" style="font-weight: 600; font-size: 14px;">...</span>
                    <span id="user-role" style="font-size: 11px; color: var(--bf-orange); text-transform: uppercase;">-</span>
                </div>
                <div class="avatar"><img id="avatar-header" src="img/default.png" onerror="this.style.display='none'"></div>
            </div>
        </div>
    </header>

    <div class="app-wrapper">
        <div id="mobile-overlay" class="mobile-overlay" onclick="app.closeSidebar()"></div>
        <aside class="sidebar" id="app-sidebar">
            <div style="padding: 10px 25px; color: var(--text-muted); font-size: 12px; letter-spacing: 1px;">NAVEGAÇÃO</div>
            <button class="nav-btn" data-target="perfil" onclick="app.navigate('perfil')">⚙️ Meu Perfil</button>
            <button class="nav-btn embarcador-only hidden" data-target="minhas-cargas" onclick="app.navigate('minhas-cargas')">📦 Gestão de Cargas</button>
            <button class="nav-btn embarcador-only hidden" data-target="postar-carga" onclick="app.navigate('postar-carga')" style="color:var(--bf-orange)">+ Nova Carga</button>
            <button class="nav-btn motorista-only hidden" data-target="gestao-cargas" onclick="app.navigate('gestao-cargas')">🔍 Procurar Fretes</button>
            <button class="nav-btn motorista-only hidden" data-target="minhas-viagens" onclick="app.navigate('minhas-viagens')">🛣️ Minhas Viagens</button>
            <button class="nav-btn motorista-only hidden" data-target="historico-viagens" onclick="app.navigate('historico-viagens')">✅ Histórico</button>
            
            <div style="flex: 1;"></div>
            <button class="nav-btn" onclick="app.logout()" style="color: #ef4444; border-top: 1px solid #333; margin-top: 10px;">❌ Sair do Sistema</button>
        </aside>

        <main class="content-area">
            <section id="view-perfil" class="view-section">
                <h2 style="font-weight: 300; margin-bottom: 25px;">⚙️ Meu Perfil</h2>
                <div class="card" style="max-width: 600px;">
                    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
                        <img id="perfil-foto-preview" src="img/default.png" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--bf-orange);">
                        <input type="file" id="input-foto" style="display:none" accept="image/*" onchange="app.uploadFoto(event)">
                        <button type="button" class="icon-btn" onclick="document.getElementById('input-foto').click()">Alterar Foto</button>
                    </div>
                    <form id="form-perfil">
                        <label style="color:var(--text-muted); font-size: 12px;">NOME COMPLETO</label>
                        <input type="text" id="perfil-nome" class="form-control" readonly>
                        <label style="color:var(--text-muted); font-size: 12px;">E-MAIL</label>
                        <input type="email" id="perfil-email" class="form-control" readonly>
                        <label style="color:var(--text-muted); font-size: 12px;">WHATSAPP</label>
                        <input type="text" id="perfil-telefone" class="form-control" readonly>
                        <div class="motorista-only hidden">
                            <label style="color:var(--text-muted); font-size: 12px;">PLACA DO VEÍCULO</label>
                            <input type="text" id="perfil-placa" class="form-control" readonly>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 20px;">
                            <button type="button" id="btn-edit-perfil" class="nav-btn" style="background: var(--bf-blue); color: white; border-radius: 8px; text-align: center;" onclick="app.toggleEditPerfil()">Editar Dados</button>
                            <button type="button" id="btn-save-perfil" class="nav-btn hidden" style="background: #10b981; color: white; border-radius: 8px; text-align: center;" onclick="app.salvarPerfil(event)">Gravar Alterações</button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="view-minhas-cargas" class="view-section active">
                <h2 style="font-weight: 300; margin-bottom: 25px;">📦 Monitoramento de Cargas</h2>
                <div id="lista-minhas-cargas"></div>
            </section>

            <section id="view-postar-carga" class="view-section">
                <h2 style="font-weight: 300; margin-bottom: 25px;">➕ Publicar Novo Frete</h2>
                <div class="card" style="max-width: 600px;">
                    <form id="form-nova-carga" onsubmit="app.postarCarga(event)">
                        <input type="text" id="carga-origem" class="form-control" placeholder="Cidade de Origem" required>
                        <input type="text" id="carga-destino" class="form-control" placeholder="Cidade de Destino" required>
                        <input type="number" id="carga-valor" class="form-control" placeholder="Valor do Frete (R$)" required>
                        <input type="text" id="carga-responsavel" class="form-control" placeholder="Nome do Responsável">
                        <textarea id="carga-descricao" class="form-control" placeholder="Observações (Peso, tipo de carga, etc)"></textarea>
                        <button type="submit" id="btn-postar" class="nav-btn" style="background: var(--bf-orange); color: white; border-radius: 8px; text-align: center; width: 100%;">Transmitir Carga</button>
                    </form>
                </div>
            </section>

            <section id="view-gestao-cargas" class="view-section"><div id="lista-cargas-disponiveis"></div></section>
            <section id="view-minhas-viagens" class="view-section"><div id="lista-minhas-viagens"></div></section>
            <section id="view-historico-viagens" class="view-section"><div id="lista-historico-viagens"></div></section>
        </main>
    </div>

    <div id="modal-chat" class="modal-overlay hidden">
        <div class="card" style="width: 95%; max-width: 450px; padding: 20px; border-color: #00a884;">
            <div id="chat-view-list">
                <h3 style="margin-top: 0; color: #00a884;">Conversas</h3>
                <div id="lista-de-contatos-chat" style="max-height: 350px; overflow-y: auto;"></div>
            </div>
            <div id="chat-view-messages" class="hidden">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                    <button class="chat-btn" onclick="app.voltarParaListaChats()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></button>
                    <h3 id="chat-titulo" style="margin: 0; color: #10b981; font-size: 16px;"></h3>
                </div>
                <div class="chat-box" id="chat-box"></div>
                <form class="chat-input-area" onsubmit="app.enviarMensagem(event)">
                    <button type="button" class="chat-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg></button>
                    <input type="text" id="chat-input" placeholder="Digite uma mensagem..." required autocomplete="off">
                    <button type="submit" class="chat-btn btn-send">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
            <button class="nav-btn" onclick="app.fecharChat()" style="margin-top: 15px; text-align: center; border: 1px solid #444; border-radius: 8px;">Fechar</button>
        </div>
    </div>

    <div id="modal-rastreio" class="modal-overlay hidden">
        <div class="card" style="width: 90%; max-width: 400px;">
            <h3>📍 Rastreio</h3>
            <div id="rastreio-info"></div>
            <button class="nav-btn" style="background: var(--bf-blue); color: white; border-radius: 8px; width: 100%; margin-top: 20px;" onclick="app.fecharRastreio()">Fechar</button>
        </div>
    </div>

    <div class="chat-fab" onclick="app.abrirListaChats()" style="position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"></path></svg>
        <span id="chat-badge" class="hidden" style="position: absolute; top: 0; right: 0; background: #ef4444; color: white; font-size: 10px; padding: 4px 8px; border-radius: 50%; border: 2px solid var(--bg-dark);">!</span>
    </div>

    <div id="toast-container"></div>
    <script src="js/dashboard.js"></script>
</body>
</html>
