<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM FRETE - Painel de Controle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bf-blue: #003D7C; --bf-blue-light: #0056b3; --bf-orange: #FF6D00; --bf-orange-hover: #ff8533;
            --bg-dark: #0d0d0d; --surface-dark: #1a1a1a; --surface-lighter: #262626; 
            --text-main: #ffffff; --text-muted: #a0a0a0; --border-color: #333;
            --wa-green: #054d44; --wa-dark: #202c33;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .topbar { height: 70px; background: rgba(26, 26, 26, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 200; }
        .topbar-left, .topbar-right { display: flex; align-items: center; width: 33%; gap: 10px; }
        .topbar-center { display: flex; justify-content: center; align-items: center; flex: 1; }
        .brand { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); }
        .brand span { color: var(--bf-orange); }

        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-muted); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; padding: 8px; border-radius: 8px; }
        .btn-hamburger { display: none; }

        .profile-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px 10px; border-radius: 30px; border: 1px solid transparent; transition: 0.3s; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background-color: var(--bf-blue); border: 2px solid var(--bf-orange); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .app-wrapper { display: flex; flex: 1; overflow: hidden; position: relative; }
        .sidebar { width: 260px; background-color: var(--surface-dark); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 0; gap: 5px; z-index: 150; }
        .nav-btn { background: transparent; color: var(--text-muted); border: none; padding: 15px 30px; text-align: left; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; width: 100%; }
        .nav-btn:hover { background-color: var(--surface-lighter); color: var(--text-main); border-left-color: var(--bf-blue-light); }
        .nav-btn.active-nav { background: linear-gradient(90deg, rgba(0,61,124,0.3) 0%, transparent 100%); color: var(--bf-orange); border-left-color: var(--bf-orange); }

        .content-area { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #111 0%, var(--bg-dark) 100%); }
        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        .hidden { display: none !important; }
        .card { background-color: var(--surface-dark); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-dark); color: var(--text-main); margin-bottom: 15px; box-sizing: border-box; }

        /* ESTILO WHATSAPP NO CHAT */
        .chat-box { height: 350px; overflow-y: auto; background: #0b141a; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #222; }
        .msg-bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 14px; color: white; position: relative; display: flex; flex-direction: column; }
        .msg-minha { align-self: flex-end; background: var(--wa-green); border-bottom-right-radius: 2px; }
        .msg-outra { align-self: flex-start; background: var(--wa-dark); border-bottom-left-radius: 2px; }
        .msg-time { font-size: 9px; opacity: 0.6; align-self: flex-end; margin-top: 4px; }

        .chat-input-area { display: flex; align-items: center; gap: 10px; background: #202c33; padding: 8px 15px; border-radius: 30px; margin-top: 15px; }
        .chat-input-area input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 5px; }
        .chat-icon-btn { background: transparent; border: none; color: #8696a0; cursor: pointer; display: flex; align-items: center; }
        .btn-send-wa { color: #00a884; }

        @media (max-width: 768px) {
            .btn-hamburger { display: flex !important; }
            .header-logout-btn { display: none !important; }
            .sidebar { position: fixed; left: -260px; top: 0; height: 100vh; transition: 0.3s; padding-top: 80px; }
            .sidebar.active { transform: translateX(260px); }
            .content-area { padding: 20px; }
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">
            <button class="icon-btn btn-hamburger" onclick="app.toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
        <div class="topbar-center">
            <div class="brand">BOM<span>FRETE</span></div>
        </div>
        <div class="topbar-right">
            <button class="icon-btn header-logout-btn" onclick="app.logout()" style="border-color: #ef4444; color: #ef4444; gap: 5px; padding: 5px 10px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span style="font-size: 11px; font-weight: bold;">SAIR</span>
            </button>
            <div class="profile-trigger" onclick="app.navigate('perfil')">
                <div class="avatar"><img id="avatar-header" src="img/default.png" onerror="this.style.display='none'"></div>
            </div>
        </div>
    </header>

    <div class="app-wrapper">
        <div id="mobile-overlay" class="mobile-overlay" onclick="app.closeSidebar()"></div>
        <aside class="sidebar" id="app-sidebar">
            <div style="padding: 10px 20px; color: var(--text-muted); font-size: 12px;">MENU</div>
            <button class="nav-btn" data-target="perfil" onclick="app.navigate('perfil')">⚙️ Meu Perfil</button>
            <button class="nav-btn embarcador-only hidden" data-target="minhas-cargas" onclick="app.navigate('minhas-cargas')">📦 Gestão de Cargas</button>
            <button class="nav-btn embarcador-only hidden" data-target="postar-carga" onclick="app.navigate('postar-carga')" style="color:var(--bf-orange)">+ Nova Carga</button>
            <button class="nav-btn motorista-only hidden" data-target="gestao-cargas" onclick="app.navigate('gestao-cargas')">🔍 Procurar Fretes</button>
            <div style="flex: 1;"></div>
            <button class="nav-btn" onclick="app.logout()" style="color: #ef4444; border-top: 1px solid #333;">❌ Sair do Sistema</button>
        </aside>

        <main class="content-area">
            <section id="view-minhas-cargas" class="view-section active">
                <h2 class="section-title">Monitoramento de Cargas</h2>
                <div id="lista-minhas-cargas"></div>
            </section>
            
            <section id="view-perfil" class="view-section">
                <h2 class="section-title">Meu Perfil</h2>
                <div class="card" id="perfil-card">
                    <form id="form-perfil">
                        <input type="text" id="perfil-nome" class="form-control" readonly>
                        <input type="email" id="perfil-email" class="form-control" readonly>
                        <input type="text" id="perfil-telefone" class="form-control" readonly>
                        <input type="text" id="perfil-placa" class="form-control hidden" readonly>
                    </form>
                </div>
            </section>

            <section id="view-postar-carga" class="view-section">
                <h2>Publicar Carga</h2>
                <form id="form-nova-carga" class="card">
                    <input type="text" id="carga-origem" class="form-control" placeholder="Origem">
                    <input type="text" id="carga-destino" class="form-control" placeholder="Destino">
                    <input type="number" id="carga-valor" class="form-control" placeholder="Valor">
                    <input type="text" id="carga-responsavel" class="form-control hidden">
                    <textarea id="carga-descricao" class="form-control hidden"></textarea>
                </form>
            </section>

            <section id="view-gestao-cargas" class="view-section"><div id="lista-cargas-disponiveis"></div></section>
            <section id="view-minhas-viagens" class="view-section"><div id="lista-minhas-viagens"></div></section>
            <section id="view-historico-viagens" class="view-section"><div id="lista-historico-viagens"></div></section>
        </main>
    </div>

    <div id="modal-chat" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 450px; padding: 15px;">
            <div id="chat-view-list">
                <h3 style="margin: 0 0 15px 0; color: var(--bf-orange);">Conversas Ativas</h3>
                <div id="lista-de-contatos-chat" style="max-height: 300px; overflow-y: auto;"></div>
            </div>

            <div id="chat-view-messages" class="hidden">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <button class="icon-btn" onclick="app.voltarParaListaChats()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></button>
                    <h3 id="chat-titulo" style="margin: 0; color: #00a884; font-size: 16px;"></h3>
                </div>
                
                <div class="chat-box" id="chat-box"></div>

                <form class="chat-input-area" onsubmit="app.enviarMensagem(event)">
                    <button type="button" class="chat-icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg></button>
                    <input type="text" id="chat-input" placeholder="Mensagem..." required autocomplete="off">
                    <button type="submit" class="chat-icon-btn btn-send-wa">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
            <button class="nav-btn" onclick="app.fecharChat()" style="margin-top: 10px; text-align: center; border: 1px solid #333; border-radius: 8px;">Fechar</button>
        </div>
    </div>

    <div class="chat-fab" onclick="app.abrirListaChats()" style="position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"></path></svg><span id="chat-badge" class="hidden">!</span></div>
    <div id="modal-rastreio" class="hidden"><div id="rastreio-info"></div></div>
    <div id="toast-container"></div>
    <script src="js/dashboard.js"></script>
</body>
</html>
