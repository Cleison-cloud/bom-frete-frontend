<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM FRETE - Painel de Controle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bf-blue: #003D7C; --bf-blue-light: #0056b3; --bf-orange: #FF6D00; --bf-orange-hover: #ff8533;
            --bg-dark: #0d0d0d; --surface-dark: #1a1a1a; --surface-lighter: #262626; 
            --text-main: #ffffff; --text-muted: #a0a0a0; --border-color: #333;
            --whatsapp-green: #054d44; --whatsapp-light: #202c33;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* TOPBAR */
        .topbar { height: 70px; background: rgba(26, 26, 26, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 200; }
        .topbar-left, .topbar-right { display: flex; align-items: center; width: 30%; gap: 10px; }
        .topbar-center { display: flex; justify-content: center; align-items: center; flex: 1; }
        .brand { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); }
        .brand span { color: var(--bf-orange); }

        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-muted); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; padding: 8px; border-radius: 8px; }
        .btn-hamburger { display: none; }

        /* SIDEBAR */
        .app-wrapper { display: flex; flex: 1; overflow: hidden; position: relative; }
        .sidebar { width: 260px; background-color: var(--surface-dark); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 0; gap: 5px; z-index: 150; }
        .nav-btn { background: transparent; color: var(--text-muted); border: none; padding: 15px 30px; text-align: left; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; width: 100%; }
        .nav-btn:hover { background-color: var(--surface-lighter); color: var(--text-main); border-left-color: var(--bf-blue-light); }
        .nav-btn.active-nav { background: linear-gradient(90deg, rgba(0,61,124,0.3) 0%, transparent 100%); color: var(--bf-orange); border-left-color: var(--bf-orange); }

        /* CHAT BUBBLES (WhatsApp Style) */
        .chat-box { height: 400px; overflow-y: auto; background: #0b141a; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border-color); }
        
        .msg-bubble { max-width: 75%; padding: 8px 12px; border-radius: 12px; position: relative; font-size: 14px; line-height: 1.5; color: white; display: flex; flex-direction: column; }
        
        .msg-minha { align-self: flex-end; background-color: var(--whatsapp-green); border-bottom-right-radius: 2px; }
        .msg-outra { align-self: flex-start; background-color: var(--whatsapp-light); border-bottom-left-radius: 2px; }

        .msg-time { font-size: 9px; color: rgba(255,255,255,0.6); align-self: flex-end; margin-top: 4px; font-weight: 400; }

        /* INPUT AREA */
        .chat-input-container { display: flex; align-items: center; gap: 10px; background: var(--surface-dark); padding: 10px; border-radius: 30px; margin-top: 15px; border: 1px solid var(--border-color); }
        .chat-input-container input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 15px; padding: 5px 10px; }
        
        .chat-action-btn { background: transparent; border: none; color: var(--bf-orange); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .chat-action-btn:hover { transform: scale(1.1); color: white; }
        .btn-send { color: #10b981; }

        /* MOBILE FIXES */
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 140; }
        @media (max-width: 768px) {
            .btn-hamburger { display: flex !important; }
            .header-logout-btn { display: none !important; }
            .sidebar { position: fixed; left: -260px; top: 0; height: 100vh; transition: 0.3s; padding-top: 80px; }
            .sidebar.active { transform: translateX(260px); }
            .mobile-overlay.active { display: block; }
        }

        /* OUTROS ESTILOS */
        .content-area { flex: 1; padding: 40px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .hidden { display: none !important; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 999; backdrop-filter: blur(5px); }
        .modal-content { background: var(--surface-dark); width: 95%; max-width: 500px; padding: 25px; border-radius: 16px; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">
            <button class="icon-btn btn-hamburger" onclick="app.toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
        <div class="topbar-center">
            <div class="brand"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--bf-orange)" stroke-width="2"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg> BOM<span>FRETE</span></div>
        </div>
        <div class="topbar-right">
            <button class="icon-btn header-logout-btn" onclick="app.logout()" style="border-color: #ef4444; color: #ef4444; gap: 5px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span style="font-size: 11px; font-weight: bold;">SAIR</span>
            </button>
            <div class="profile-trigger" onclick="app.navigate('perfil')">
                <div class="avatar"><img id="avatar-header" src="img/default.png" onerror="this.style.display='none'"></div>
            </div>
        </div>
    </header>

    <div class="app-wrapper">
        <div id="mobile-overlay" class="mobile-overlay" onclick="app.closeSidebar()"></div>
        <aside class="sidebar" id="app-sidebar">
            <div style="padding: 10px 25px; color: var(--text-muted); font-size: 12px;">MENU</div>
            <button class="nav-btn" data-target="perfil" onclick="app.navigate('perfil')">⚙️ Meu Perfil</button>
            <button class="nav-btn embarcador-only hidden" data-target="minhas-cargas" onclick="app.navigate('minhas-cargas')">📦 Minhas Cargas</button>
            <button class="nav-btn embarcador-only hidden" data-target="postar-carga" onclick="app.navigate('postar-carga')" style="color:var(--bf-orange)">+ Nova Carga</button>
            <button class="nav-btn motorista-only hidden" data-target="gestao-cargas" onclick="app.navigate('gestao-cargas')">🔍 Procurar Fretes</button>
            <div style="flex: 1;"></div>
            <button class="nav-btn" onclick="app.logout()" style="color: #ef4444; border-top: 1px solid #333;">❌ Sair do Sistema</button>
        </aside>

        <main class="content-area">
            <section id="view-minhas-cargas" class="view-section active">
                <h2 style="font-weight: 300; margin-bottom: 20px;">📦 Gestão de Cargas</h2>
                <div id="lista-minhas-cargas"></div>
            </section>
            <section id="view-perfil" class="view-section">
                <h2>⚙️ Meu Perfil</h2>
                <div id="perfil-card"></div>
            </section>
            <section id="view-postar-carga" class="view-section"></section>
            <section id="view-gestao-cargas" class="view-section"></section>
            <section id="view-minhas-viagens" class="view-section"></section>
            <section id="view-historico-viagens" class="view-section"></section>
        </main>
    </div>

    <div id="modal-chat" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="chat-view-list">
                <h3 style="margin-top: 0; color: var(--bf-orange);">Conversas</h3>
                <div id="lista-de-contatos-chat" style="max-height: 350px; overflow-y: auto;"></div>
            </div>

            <div id="chat-view-messages" class="hidden">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                    <button class="chat-action-btn" onclick="app.voltarParaListaChats()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></button>
                    <h3 id="chat-titulo" style="margin: 0; color: #10b981;"></h3>
                </div>
                
                <div class="chat-box" id="chat-box">
                    </div>

                <form class="chat-input-container" onsubmit="app.enviarMensagem(event)">
                    <button type="button" class="chat-action-btn" title="Enviar áudio (Em breve)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </button>
                    <input type="text" id="chat-input" placeholder="Digite uma mensagem..." required autocomplete="off">
                    <button type="submit" class="chat-action-btn btn-send">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
            <button class="nav-btn" onclick="app.fecharChat()" style="margin-top: 15px; text-align: center; border: 1px solid #444; border-radius: 8px;">Fechar</button>
        </div>
    </div>

    <div class="chat-fab" onclick="app.abrirListaChats()" style="position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"></path></svg>
        <span id="chat-badge" class="hidden" style="position: absolute; top: 0; right: 0; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px;">!</span>
    </div>

    <div id="modal-rastreio" class="hidden"><div id="rastreio-info"></div></div>
    <div id="toast-container"></div>
    <script src="js/dashboard.js"></script>
</body>
</html>
